<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MarketJS</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body class="dashboard-page">

    <div id="app-content">
        <div class="bento-grid">
            <div class="bento-item bento-large">
                <span class="stat-label">Monthly Growth</span>
                <div style="margin-top:25px;display:flex;align-items:flex-end;gap:12px;height:160px">
                    <div style="flex:1;height:40%;background:var(--primary-light);border-radius:6px"></div>
                    <div style="flex:1;height:65%;background:var(--primary-light);border-radius:6px"></div>
                    <div style="flex:1;height:50%;background:var(--primary-light);border-radius:6px"></div>
                    <div style="flex:1;height:85%;background:var(--primary);border-radius:6px"></div>
                    <div style="flex:1;height:60%;background:var(--primary-light);border-radius:6px"></div>
                    <div style="flex:1;height:95%;background:var(--primary-light);border-radius:6px"></div>
                </div>
            </div>
            <div class="bento-item">
                <span class="stat-label">Net Revenue</span>
                <span class="stat-number">Rp 2.4B</span>
                <div style="margin-top:10px;color:#10b981;font-weight:700;font-size:0.8rem">↑ 12.5%</div>
            </div>
            <div class="bento-item">
                <span class="stat-label">Total Orders</span>
                <span class="stat-number">1,240</span>
                <div style="margin-top:10px;color:var(--text-muted);font-size:0.8rem">Across 12 regions</div>
            </div>
            <div class="bento-item bento-medium">
                <span class="stat-label">Recent Activity</span>
                <table class="data-table">
                    <thead>
                        <tr><th>CLIENT</th><th>STATUS</th><th>AMOUNT</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Marketplace-A</td>
                            <td style="color:#10b981;font-weight:600">Success</td>
                            <td>Rp 150k</td>
                        </tr>
                        <tr>
                            <td>Global-User</td>
                            <td style="color:#f59e0b;font-weight:600">Pending</td>
                            <td>Rp 840k</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/layout.js"></script>
</body>
</html>
