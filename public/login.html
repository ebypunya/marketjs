<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MarketJS</title>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <div class="container animate-fade-in">
        <div class="form-card">
            <h2>Masuk ke MarketJS</h2>
            <form action="/login-proses" method="POST" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Username Anda" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Password Anda" required>
                        <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                    </div>
                </div>
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        Ingat Saya
                    </label>
                    <a href="/lupa-password" class="forgot-link">Lupa Password?</a>
                </div>
                <button type="submit" class="btn-primary">Masuk Sekarang</button>
            </form>
            <p class="switch-form">Belum punya akun? <a href="/registrasi">Daftar</a></p>
        </div>
        <footer>
            <p>&copy; DeV#477 2026</p>
        </footer>
    </div>
    <script src="/assets/js/login.js"></script>
</body>
</html>
