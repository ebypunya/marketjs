<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MarketJS</title>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <div class="container animate-fade-in">
        <div class="form-card">
            <h2>Masuk ke MarketJS</h2>
            <form action="/login-proses" method="POST" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Username Anda" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Password Anda" required>
                        <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                    </div>
                </div>
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        Ingat Saya
                    </label>
                    <a href="/lupa-password" class="forgot-link">Lupa Password?</a>
                </div>
                <button type="submit" class="btn-primary">Masuk Sekarang</button>
            </form>
            <p class="switch-form">Belum punya akun? <a href="/registrasi">Daftar</a></p>
        </div>
        <footer>
            <p>&copy; DeV#477 2026</p>
        </footer>
    </div>
    <script src="/assets/js/login.js"></script>
    <script>
    // Tampilkan pesan error dari query param
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const messages = {
        'invalid': '❌ Username atau password salah.',
        'pending': '⏳ Akun belum aktif. Hubungi Team IT untuk aktivasi.',
        'banned': '🚫 Akun Anda telah dinonaktifkan.',
        'unauthorized': '🔒 Silahkan login terlebih dahulu.'
    };
    if (error && messages[error]) {
        const div = document.createElement('div');
        div.style = 'background:#fef2f2;color:#dc2626;padding:12px 16px;border-radius:8px;font-size:0.85rem;font-weight:600;margin-bottom:16px;text-align:center';
        div.textContent = messages[error];
        document.querySelector('form').prepend(div);
    }

    // Popup registrasi berhasil
    const status = params.get('status');
    if (status === 'success') {
        document.getElementById('popup-overlay').style.display = 'flex';
    }
</script>
<script src="/assets/js/login.js"></script>
</body>
</html>
