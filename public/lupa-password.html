<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - MarketJS</title>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <div class="container animate-fade-in">
        <div class="form-card">
            <h2>Reset Password</h2>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Masukkan email Anda untuk menerima instruksi reset.</p>
            <form action="/reset-proses" method="POST">
                <div class="form-group">
                    <label>Email Terdaftar</label>
                    <input type="email" name="email" placeholder="email@anda.com" required>
                </div>
                <button type="submit" class="btn-primary">Kirim Instruksi</button>
            </form>
            <p class="switch-form"><a href="login.html">Kembali ke Login</a></p>
        </div>
        <footer>
            <p>&copy; DeV#477 2026</p>
        </footer>
    </div>
</body>
</html>
