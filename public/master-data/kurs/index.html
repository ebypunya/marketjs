<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs - MarketJS</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body class="dashboard-page">

    <div id="app-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
            <!-- Info kurs terbaru -->
            <div id="latest-kurs" style="display:flex;gap:16px">
                <div style="padding:8px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;font-size:0.82rem">
                    <span style="color:#64748b;font-weight:600">SELL RATE</span>
                    <span id="latest-sell" style="color:#16a34a;font-weight:800;font-size:1rem;margin-left:8px">-</span>
                </div>
                <div style="padding:8px 16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;font-size:0.82rem">
                    <span style="color:#64748b;font-weight:600">BUY RATE</span>
                    <span id="latest-buy" style="color:#2563eb;font-weight:800;font-size:1rem;margin-left:8px">-</span>
                </div>
            </div>
            <a href="/master-data/kurs/tambah"
            style="display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--primary);color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.88rem">
            <i class="ti ti-plus"></i> Tambah Kurs
        </a>
    </div>

    <div class="bento-item" style="padding:0;overflow:hidden">
        <table class="data-table" style="margin:0">
            <thead>
                <tr style="background:var(--bg-main)">
                    <th style="padding:14px 20px;width:44px">#</th>
                    <th style="padding:14px 20px">TANGGAL</th>
                    <th style="padding:14px 20px;text-align:right">SELL RATE (Rp)</th>
                    <th style="padding:14px 20px;text-align:right">BUY RATE (Rp)</th>
                    <th style="padding:14px 20px;text-align:center">SELISIH</th>
                    <th style="padding:14px 20px;width:140px">AKSI</th>
                </tr>
            </thead>
            <tbody id="kurs-tbody">
                <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">Memuat data...</td></tr>
            </tbody>
        </table>

        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--border-color);background:var(--bg-main)">
            <span id="pagination-info" style="font-size:0.8rem;color:var(--text-muted)">-</span>
            <div id="pagination-controls" style="display:flex;gap:6px"></div>
        </div>
    </div>
</div>

<!-- Modal Hapus -->
<div id="delete-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;justify-content:center;align-items:center">
    <div style="background:#fff;border-radius:16px;padding:32px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15)">
        <div style="font-size:48px;margin-bottom:10px">🗑️</div>
        <h3 style="margin:0 0 8px;color:#0f172a">Hapus Data Kurs?</h3>
        <p style="color:#64748b;font-size:0.88rem;margin-bottom:24px">Data kurs tanggal <b id="delete-name"></b> akan dihapus permanen.</p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button onclick="closeDeleteModal()"
            style="padding:10px 24px;border:1px solid var(--border-color);border-radius:8px;background:#fff;font-weight:600;cursor:pointer;font-family:inherit">Batal</button>
            <button onclick="confirmDelete()"
            style="padding:10px 24px;background:#ef4444;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit">Hapus</button>
        </div>
    </div>
</div>

<script src="/assets/js/sidebar.js"></script>
<script src="/assets/js/layout.js"></script>
<script>
    let allRates = [];
    let currentPage = 1;
    const PER_PAGE = 10;
    let deleteId = null;

    function loadRates() {
        fetch('/api/rates')
        .then(r => r.json())
        .then(data => {
            allRates = data;
            currentPage = 1;

            // Tampilkan kurs terbaru di badge atas
            if (data.length > 0) {
                const latest = data[0];
                document.getElementById('latest-sell').textContent = formatCurrency(latest.sell_rate);
                document.getElementById('latest-buy').textContent  = formatCurrency(latest.buy_rate);
            }

            renderTable();
        })
        .catch(() => {
            document.getElementById('kurs-tbody').innerHTML =
            '<tr><td colspan="6" style="text-align:center;padding:40px;color:#ef4444">Gagal memuat data.</td></tr>';
        });
    }

    function formatDate(str) {
        if (!str) return '-';
        const d = new Date(str);
        const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
        const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
        return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function formatCurrency(val) {
        if (val === null || val === undefined || val === '') return '-';
        return 'Rp ' + Number(val).toLocaleString('id-ID');
    }

    function renderTable() {
        const tbody = document.getElementById('kurs-tbody');
        const total = allRates.length;
        const totalPages = Math.ceil(total / PER_PAGE) || 1;
        currentPage = Math.min(currentPage, totalPages);

        const start = (currentPage - 1) * PER_PAGE;
        const end = start + PER_PAGE;
        const pageData = allRates.slice(start, end);

        if (total === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">Belum ada data kurs.</td></tr>';
            document.getElementById('pagination-info').textContent = '0 data';
            document.getElementById('pagination-controls').innerHTML = '';
            return;
        }

        tbody.innerHTML = pageData.map((r, i) => {
            const selisih = (r.sell_rate && r.buy_rate) ? (r.sell_rate - r.buy_rate) : null;
            const isLatest = (start + i === 0);
            return `
            <tr style="${isLatest ? 'background:#fafff5;' : ''}">
            <td style="padding:13px 20px;color:var(--text-muted);font-size:0.82rem">${start + i + 1}</td>
            <td style="padding:13px 20px;font-weight:600">
                ${isLatest ? '<span style="display:inline-block;background:#dcfce7;color:#16a34a;font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:20px;margin-right:6px;vertical-align:middle">TERBARU</span>' : ''}
                ${formatDate(r.created_at)}
            </td>
            <td style="padding:13px 20px;text-align:right;font-weight:700;color:#16a34a;font-size:0.95rem">${formatCurrency(r.sell_rate)}</td>
            <td style="padding:13px 20px;text-align:right;font-weight:700;color:#2563eb;font-size:0.95rem">${formatCurrency(r.buy_rate)}</td>
            <td style="padding:13px 20px;text-align:center;font-size:0.85rem">
                ${selisih !== null ? `<span style="background:#fff7ed;color:#c2410c;padding:3px 10px;border-radius:20px;font-weight:700">${formatCurrency(selisih)}</span>` : '-'}
            </td>
            <td style="padding:13px 20px">
            <div style="display:flex;gap:6px">
            <a href="/master-data/kurs/edit?id=${r.id}"
            style="display:flex;align-items:center;gap:4px;padding:6px 10px;background:#eef2ff;color:var(--primary);border-radius:7px;text-decoration:none;font-size:0.78rem;font-weight:600">
            <i class="ti ti-edit" style="font-size:13px"></i> Edit
            </a>
            <button onclick="openDeleteModal(${r.id}, '${formatDate(r.created_at)}')"
            style="display:flex;align-items:center;gap:4px;padding:6px 10px;background:#fef2f2;color:#ef4444;border:none;border-radius:7px;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:inherit">
            <i class="ti ti-trash" style="font-size:13px"></i> Hapus
            </button>
            </div>
            </td>
            </tr>`;
        }).join('');

        document.getElementById('pagination-info').textContent =
        `Menampilkan ${start + 1}–${Math.min(end, total)} dari ${total} data`;

        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const ctrl = document.getElementById('pagination-controls');
        if (totalPages <= 1) { ctrl.innerHTML = ''; return; }

        const btnStyle = (active) =>
        `padding:6px 12px;border-radius:7px;border:1px solid ${active ? 'var(--primary)' : 'var(--border-color)'};
        background:${active ? 'var(--primary)' : '#fff'};color:${active ? '#fff' : 'var(--text-muted)'};
        font-size:0.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s`;

        let html = `<button style="${btnStyle(false)}" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
        <i class="ti ti-chevron-left"></i></button>`;

        let pages = [];
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                pages.push(i);
            } else if (pages[pages.length - 1] !== '...') {
                pages.push('...');
            }
        }

        pages.forEach(p => {
            if (p === '...') {
                html += `<span style="padding:6px 8px;color:var(--text-muted);font-size:0.8rem">…</span>`;
            } else {
                html += `<button style="${btnStyle(p === currentPage)}" onclick="goPage(${p})">${p}</button>`;
            }
        });

        html += `<button style="${btnStyle(false)}" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
        <i class="ti ti-chevron-right"></i></button>`;

        ctrl.innerHTML = html;
    }

    function goPage(page) {
        const totalPages = Math.ceil(allRates.length / PER_PAGE) || 1;
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderTable();
    }

    function openDeleteModal(id, label) {
        deleteId = id;
        document.getElementById('delete-name').textContent = label;
        document.getElementById('delete-modal').style.display = 'flex';
    }
    function closeDeleteModal() {
        deleteId = null;
        document.getElementById('delete-modal').style.display = 'none';
    }
    function confirmDelete() {
        fetch('/api/rates/' + deleteId, { method: 'DELETE' })
        .then(r => r.json())
        .then(() => { closeDeleteModal(); loadRates(); })
        .catch(() => alert('Gagal menghapus data.'));
    }

    document.addEventListener('DOMContentLoaded', loadRates);
</script>
</body>
</html>
