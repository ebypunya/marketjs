<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Customer - MarketJS</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body class="dashboard-page">

    <div id="app-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
            <input type="text" id="search-input" placeholder="🔍  Cari nama atau alamat..."
            style="padding:10px 16px;border:1px solid var(--border-color);border-radius:10px;font-size:0.88rem;width:280px;outline:none;font-family:inherit">
            <a href="/master-data/customers/tambah"
            style="display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--primary);color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.88rem">
            <i class="ti ti-plus"></i> Tambah Customer
        </a>
    </div>

    <div class="bento-item" style="padding:0;overflow:hidden">
        <table class="data-table" style="margin:0">
            <thead>
                <tr style="background:var(--bg-main)">
                    <th style="padding:14px 20px;width:50px">#</th>
                    <th style="padding:14px 20px">NAMA PERUSAHAAN</th>
                    <th style="padding:14px 20px">ALAMAT</th>
                    <th style="padding:14px 20px;width:160px">AKSI</th>
                </tr>
            </thead>
            <tbody id="customer-tbody">
                <tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted)">Memuat data...</td></tr>
            </tbody>
        </table>

        <!-- Footer tabel: info + pagination -->
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--border-color);background:var(--bg-main)">
            <span id="pagination-info" style="font-size:0.8rem;color:var(--text-muted)">-</span>
            <div id="pagination-controls" style="display:flex;gap:6px"></div>
        </div>
    </div>
</div>

<!-- Modal Hapus -->
<div id="delete-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;justify-content:center;align-items:center">
    <div style="background:#fff;border-radius:16px;padding:32px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15)">
        <div style="font-size:48px;margin-bottom:10px">🗑️</div>
        <h3 style="margin:0 0 8px;color:#0f172a">Hapus Customer?</h3>
        <p style="color:#64748b;font-size:0.88rem;margin-bottom:24px">Data <b id="delete-name"></b> akan dihapus permanen.</p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button onclick="closeDeleteModal()"
            style="padding:10px 24px;border:1px solid var(--border-color);border-radius:8px;background:#fff;font-weight:600;cursor:pointer;font-family:inherit">Batal</button>
            <button onclick="confirmDelete()"
            style="padding:10px 24px;background:#ef4444;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit">Hapus</button>
        </div>
    </div>
</div>

<script src="/assets/js/sidebar.js"></script>
<script src="/assets/js/layout.js"></script>
<script>
    let allCustomers = [];
    let filtered = [];
    let currentPage = 1;
    const PER_PAGE = 10;
    let deleteId = null;

    function loadCustomers() {
        fetch('/api/customers')
        .then(r => r.json())
        .then(data => {
            allCustomers = data;
            filtered = data;
            currentPage = 1;
            renderTable();
        })
        .catch(() => {
            document.getElementById('customer-tbody').innerHTML =
            '<tr><td colspan="4" style="text-align:center;padding:40px;color:#ef4444">Gagal memuat data.</td></tr>';
        });
    }

    function renderTable() {
        const tbody = document.getElementById('customer-tbody');
        const total = filtered.length;
        const totalPages = Math.ceil(total / PER_PAGE) || 1;
        currentPage = Math.min(currentPage, totalPages);

        const start = (currentPage - 1) * PER_PAGE;
        const end = start + PER_PAGE;
        const pageData = filtered.slice(start, end);

        if (total === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted)">Tidak ada data customer.</td></tr>';
            document.getElementById('pagination-info').textContent = '0 data';
            document.getElementById('pagination-controls').innerHTML = '';
            return;
        }

        tbody.innerHTML = pageData.map((c, i) => `
            <tr>
            <td style="padding:13px 20px;color:var(--text-muted);font-size:0.82rem">${start + i + 1}</td>
            <td style="padding:13px 20px;font-weight:600">${escHtml(c.name)}</td>
            <td style="padding:13px 20px;color:var(--text-muted);font-size:0.88rem">${escHtml(c.address || '-')}</td>
            <td style="padding:13px 20px">
            <div style="display:flex;gap:8px">
            <a href="/master-data/customers/edit?id=${c.id}"
            style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:#eef2ff;color:var(--primary);border-radius:7px;text-decoration:none;font-size:0.8rem;font-weight:600">
            <i class="ti ti-edit" style="font-size:13px"></i> Edit
            </a>
            <button onclick="openDeleteModal(${c.id}, '${escAttr(c.name)}')"
            style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:#fef2f2;color:#ef4444;border:none;border-radius:7px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:inherit">
            <i class="ti ti-trash" style="font-size:13px"></i> Hapus
            </button>
            </div>
            </td>
            </tr>
            `).join('');

    // Info
    document.getElementById('pagination-info').textContent =
    `Menampilkan ${start + 1}–${Math.min(end, total)} dari ${total} data`;

    // Pagination buttons
    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const ctrl = document.getElementById('pagination-controls');
    if (totalPages <= 1) { ctrl.innerHTML = ''; return; }

    const btnStyle = (active) =>
    `padding:6px 12px;border-radius:7px;border:1px solid ${active ? 'var(--primary)' : 'var(--border-color)'};
    background:${active ? 'var(--primary)' : '#fff'};color:${active ? '#fff' : 'var(--text-muted)'};
    font-size:0.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s`;

    let html = `<button style="${btnStyle(false)}" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
    <i class="ti ti-chevron-left"></i></button>`;

    // Tampilkan halaman dengan ellipsis
    let pages = [];
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
            pages.push(i);
        } else if (pages[pages.length - 1] !== '...') {
            pages.push('...');
        }
    }

    pages.forEach(p => {
        if (p === '...') {
            html += `<span style="padding:6px 8px;color:var(--text-muted);font-size:0.8rem">…</span>`;
        } else {
            html += `<button style="${btnStyle(p === currentPage)}" onclick="goPage(${p})">${p}</button>`;
        }
    });

    html += `<button style="${btnStyle(false)}" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
    <i class="ti ti-chevron-right"></i></button>`;

    ctrl.innerHTML = html;
}

function goPage(page) {
    const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTable();
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(str) {
    return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function openDeleteModal(id, name) {
    deleteId = id;
    document.getElementById('delete-name').textContent = name;
    document.getElementById('delete-modal').style.display = 'flex';
}
function closeDeleteModal() {
    deleteId = null;
    document.getElementById('delete-modal').style.display = 'none';
}
function confirmDelete() {
    fetch('/api/customers/' + deleteId, { method: 'DELETE' })
    .then(r => r.json())
    .then(() => { closeDeleteModal(); loadCustomers(); })
    .catch(() => alert('Gagal menghapus data.'));
}

document.addEventListener('DOMContentLoaded', () => {
    loadCustomers();
    document.getElementById('search-input').addEventListener('input', function () {
        const q = this.value.toLowerCase();
        filtered = allCustomers.filter(c =>
            c.name.toLowerCase().includes(q) ||
            (c.address && c.address.toLowerCase().includes(q))
            );
        currentPage = 1;
        renderTable();
    });
});
</script>
</body>
</html>
