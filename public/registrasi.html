<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - MarketJS</title>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <div class="container animate-fade-in">
        <div class="form-card">
            <h2>Buat Akun Baru</h2>
            <form action="/register-proses" method="POST">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" name="fullname" placeholder="Nama Lengkap Anda" required>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Buat username unik" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="email@contoh.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" name="password" placeholder="Buat Password" required>
                        <span class="toggle-password" onclick="togglePassword('reg-password')">👁️</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Daftar Akun</button>
            </form>
            <p class="switch-form">Sudah punya akun? <a href="/">Masuk</a></p>
        </div>
        <footer>
            <p>&copy; DeV#477 2026</p>
        </footer>
    </div>
    <script src="/assets/js/login.js"></script>
</body>
</html>
